    notes: |
      raw: Isaac-GR00T/data 时间戳采集
      转换源: processed/g1_manip_sonic_unified
      转换: datasets/sonic_g1/scripts/convert_to_phi0.py（待实现）

  # --- VLN / Navigation (InternData-N1 → phi0_action_v1 [0:9) root 段) ---

  - id: r2r
    display_name: VLN-CE R2R
    path: Phi0-MixCorpus/datasets/interndata_n1/train/vln_ce_r2r_phi0
    action_schema: unified_512
    embodiment: mobile_agent
    tags: [navigation, vln, instruction_following, trajectory]
    weight: 1.0
    supervision: null
    status: pending
    priority: required
    notes: |
      【必须】InternData-N1 vln_ce R2R；action.dim_mask 仅 [0:9) root 段
      转换源: raw/vln_ce/traj_data/r2r + raw_data/r2r
