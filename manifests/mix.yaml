# Phi-0 混训注册表
# path: Phi-0 canonical LeRobot v3.0 训练目录（见 demo/PHI0_DATASET_SCHEMA.md）
# action_schema: 统一为 unified_512（= phi0_action_v1）
# weight: 采样权重（weighted mixture）
# supervision: 转换默认 mask 模板名；运行时用 Parquet action.dim_mask
# status: pending | converting | ready

version: 1
mix_name: phi0_mix_v1

datasets:
  - id: xperience
    display_name: Xperience
    path: Phi0-MixCorpus/datasets/xperience/train/pick_tissue_xperience_phi0
    action_schema: unified_512
    embodiment: human_egocentric
    tags: [manipulation, mocap]
    weight: 1.0
    supervision: null
    status: pending
    notes: |
      raw: ropedia-ai/xperience-10m-sample（~7.4GB）
      转换源: slices/pick_tissue_xperience_unified 或 stereo_left + HDF5
      单目: stereo_left → observation.images.ego_view
      转换: datasets/xperience/scripts/convert_to_phi0.py（待实现）

  - id: egodex
    display_name: EgoDex
    path: Phi0-MixCorpus/datasets/egodex/train/demo_add_remove_lid_phi0
    action_schema: unified_512
    embodiment: human_egocentric
    tags: [manipulation]
    weight: 1.0
    supervision: null
    status: pending
    notes: |
      raw: egodex_dex_{ziyi,wam}, egoverse_full, demo_hf
      转换源: slices/demo_add_remove_lid
      proprio: Sonic SMPL encoder / motion planner 补全（见 PHI0_DATASET_SCHEMA §6）
      转换: datasets/egodex/scripts/convert_to_phi0.py（待实现）

  - id: humanoid_everyday
    display_name: Humanoid Everyday
    path: Phi0-MixCorpus/datasets/humanoid_everyday/train/he_kettle_one_ep_phi0
    action_schema: unified_512
    embodiment: humanoid
    tags: [manipulation]
    weight: 1.0
    supervision: null
    status: pending
    notes: |
      raw: USC-GVL/humanoid-everyday 2-episode 切片（hf_slices）
      slices: he_kettle_one_ep, walk_one_ep（本地副本）
      全量 HF 尚未下载

  - id: t_rex
    display_name: T-Rex
    path: Phi0-MixCorpus/datasets/t_rex/train/trex_phi0
    action_schema: unified_512
    embodiment: dexterous_hand
    tags: [manipulation, tactile]
    weight: 1.0
    supervision: null
    status: pending
    notes: |
      HF: zekaiwang/trex_dataset（LeRobot v3.0，~7900 files）
      转换源: raw/trex_dataset → trex_phi0
      下载: bash datasets/t_rex/scripts/download.sh
      转换: datasets/t_rex/scripts/convert_to_phi0.py（待实现）

  - id: bone_seed
    display_name: Bone-SEED
    path: Phi0-MixCorpus/datasets/bone_seed/train/protomotions_g1_phi0
    action_schema: unified_512
    embodiment: human_mocap
    tags: [locomotion]
    weight: 1.0
    supervision: null
    status: pending
    notes: |
      raw: bones-studio/seed（~71GB，软链）
      processed: ProtoMotions g1 chunks（~114GB）

  - id: phuma
    display_name: PHUMA
    path: Phi0-MixCorpus/datasets/phuma/train/protomotions_g1_phi0
    action_schema: unified_512
    embodiment: human_mocap
    tags: [locomotion]
    weight: 1.0
    supervision: null
    status: pending
    notes: |
      raw: DAVIAN-Robotics/PHUMA（~23GB）+ phuma-upstream
